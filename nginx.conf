server {
    listen 80;
    server_name bloodmate.xyz www.bloodmate.xyz;

    # Serve the React Frontend Build
    root /home/ubuntu/BloodMate-Py/frontend/dist;
    index index.html index.htm;

    # Frontend Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API Requests to FastAPI Backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Log configurations for debugging
    error_log /var/log/nginx/bloodmate_error.log;
    access_log /var/log/nginx/bloodmate_access.log;
}
